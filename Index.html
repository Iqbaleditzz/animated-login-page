<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#23242a;
}

.box{
    position:relative;
    width:380px;
    height:420px;
    background:#1c1c1c;
    border-radius:8px;
    overflow:hidden;
}

.box::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:380px;
    height:420px;
    background:linear-gradient(0deg,transparent,#45f3ff,#45f3ff);
    transform-origin:bottom right;
    animation:animate 6s linear infinite;
}

.box::after{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:380px;
    height:420px;
    background:linear-gradient(0deg,transparent,#45f3ff,#45f3ff);
    transform-origin:bottom right;
    animation:animate 6s linear infinite;
    animation-delay:-3s;
}

@keyframes animate{
    0%{
        transform:rotate(0deg);
    }
    100%{
        transform:rotate(360deg);
    }
}

.form{
    position:absolute;
    inset:2px;
    border-radius:8px;
    background:#28292d;
    z-index:10;
    padding:50px 40px;
    display:flex;
    flex-direction:column;
}

.form h2{
    color:#45f3ff;
    font-weight:500;
    letter-spacing:.1em;
    text-align:center;
}

.inputBox{
    position:relative;
    width:100%;
    margin-top:35px;
}

.inputBox input{
    position:relative;
    width:100%;
    padding:20px 10px 10px;
    background:transparent;
    border:none;
    outline:none;
    color:#23242a;
    font-size:1em;
    letter-spacing:.05em;
    z-index:10;
}

.inputBox span{
    position:absolute;
    left:0;
    padding:20px 0 10px;
    font-size:1em;
    color:#8f8f8f;
    pointer-events:none;
    letter-spacing:.05em;
    transition:.5s;
}

.inputBox input:valid ~ span,
.inputBox input:focus ~ span{
    color:#45f3ff;
    transform:translateY(-34px);
    font-size:.75em;
}

.inputBox i{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:2px;
    background:#45f3ff;
    border-radius:4px;
    transition:.5s;
    pointer-events:none;
    z-index:9;
}

.inputBox input:valid ~ i,
.inputBox input:focus ~ i{
    height:44px;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.links a{
    font-size:.75em;
    color:#8f8f8f;
    text-decoration:none;
}

.links a:hover,
.links a:nth-child(2){
    color:#45f3ff;
}

.submit-btn{
    border:1px solid #45f3ff;
    outline:none;
    background:transparent;
    color:#fff;
    padding:11px 25px;
    width:100px;
    margin-top:20px;
    border-radius:4px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#45f3ff;
    color:#23242a;
}

.submit-btn:active{
    opacity:.8;
}
</style>
</head>

<body>

<div class="box">
    <form class="form">
        <h2>Sign In</h2>

        <div class="inputBox">
            <input type="text" required>
            <span>Username</span>
            <i></i>
        </div>

        <div class="inputBox">
            <input type="password" required>
            <span>Password</span>
            <i></i>
        </div>

        <div class="links">
            <a href="#">Forgot Password</a>
            <a href="#">Signup</a>
        </div>

        <input type="submit" value="Login" class="submit-btn">
    </form>
</div>

</body>
</html>
